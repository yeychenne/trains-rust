\* TLC config for TRAINS_MC.tla — small model, ~100K-2M states.
\* Run:  java -cp tla2tools.jar tlc2.TLC TRAINS_MC.tla -config TRAINS_MC.cfg -workers auto -noGenerateSpecTE

SPECIFICATION Spec

\* TRAINS deadlocks legitimately when too many processes crash and
\* trains are stuck at crashed positions (no live process can move
\* them).  This is the ring's liveness limit, not a safety bug.
CHECK_DEADLOCK FALSE

CONSTANTS
    Procs      = {0, 1, 2}
    ring       <- ring_value
    NumTrains  = 2
    Messages   = {m1, m2, m3}
    MaxClock   = 6
    MaxPending = 2
    Mode       = "UTO"

SYMMETRY MessageSymmetry

CONSTRAINT StateConstraint

INVARIANTS
    TypeOK
    ClockMonotonicity
    ConsistentDelivery
    NoSpuriousDelivery
    TrainIntegrity
    IssuerUniqueness

PROPERTIES
    EventualDelivery
