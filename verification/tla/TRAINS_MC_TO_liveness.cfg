\* TLC config for TRAINS_MC.tla, TO mode + LIVENESS for dynamic membership.
\*
\* Run:  java -cp tla2tools.jar tlc2.TLC TRAINS_MC.tla \
\*           -config TRAINS_MC_TO_liveness.cfg -workers auto -noGenerateSpecTE
\*
\* This is the membership-round equivalent of the EventualDelivery
\* liveness check in TRAINS_MC.cfg.  It uses `SpecTOLiveness` (defined
\* in TRAINS_MC.tla) which extends the master Spec with Strong Fairness
\* on ReAdmit.  No fairness is added to Reconfigure — crashes are
\* adversarial and modelled non-deterministically.
\*
\* Model: tiny on purpose.  TLC liveness checking is 5-10x slower than
\* safety; the safety configs (TRAINS_MC_TO.cfg) already cover the big
\* 6.28M-state model.  Here we want a clean liveness claim, so we keep
\* the state space small enough that any liveness failure surfaces
\* quickly.

SPECIFICATION SpecTOLiveness

CHECK_DEADLOCK FALSE

CONSTANTS
    Procs      = {0, 1, 2}
    ring       <- ring_value
    NumTrains  = 1
    Messages   = {m1}
    MaxClock   = 3
    MaxPending = 1
    Mode       = "TO"

\* SYMMETRY MessageSymmetry  — disabled for liveness checking.  TLC's
\* documentation explicitly warns that symmetry can mask liveness
\* violations.  With Messages = {m1} symmetry would be trivial anyway
\* (one element), but we leave the comment so a future enlarged-model
\* run does not silently re-enable it.

CONSTRAINT StateConstraint

INVARIANTS
    TypeOK
    ConsistentDelivery

PROPERTIES
    EventualReAdmit
