\* TLC config for TRAINS_MC.tla in TO (TotalOrder) mode — exercises the
\* Reconfigure (C3 exclude) AND ReAdmit (v3 re-admit) view-change actions.
\* Run:  java -cp tla2tools.jar tlc2.TLC TRAINS_MC.tla -config TRAINS_MC_TO.cfg -workers auto -noGenerateSpecTE
\*
\* Checks SAFETY only. Liveness (EventualDelivery) is intentionally NOT
\* checked here: in TO mode a message in flight when its train's holder
\* crashes is lost (the at-least-once reliability gap — delivered nowhere,
\* so safe), which legitimately violates EventualDelivery. The bar this
\* config raises is that uniform agreement (ConsistentDelivery) and the
\* other safety invariants hold ACROSS a Reconfigure — and, since the v3
\* work, ACROSS a ReAdmit too (membership both grows and shrinks here).
\* Result (2026-06-16, ReAdmit added): 6 282 464 distinct states, no error —
\* ConsistentDelivery is preserved across re-admission.

SPECIFICATION Spec

CHECK_DEADLOCK FALSE

CONSTANTS
    Procs      = {0, 1, 2}
    ring       <- ring_value
    NumTrains  = 2
    Messages   = {m1, m2, m3}
    MaxClock   = 4
    MaxPending = 2
    Mode       = "TO"

SYMMETRY MessageSymmetry

CONSTRAINT StateConstraint

INVARIANTS
    TypeOK
    ClockMonotonicity
    ConsistentDelivery
    NoSpuriousDelivery
    TrainIntegrity
    IssuerUniqueness
