\* TLC config: bigger N=4 model — MaxClock=5, 3 messages.  Same shape as
\* TRAINS_MC_N4.cfg but pushes one notch in each axis.  Goal: one round of
\* "does the bigger model still hold?", same instinct that caught bug #3.
\*
\* Run:
\*   JAVA_HOME=... java -XX:+UseParallelGC -cp /tmp/tla2tools.jar tlc2.TLC \
\*     TRAINS_MC.tla -config TRAINS_MC_N4_bigger.cfg -workers auto -noGenerateSpecTE

SPECIFICATION Spec

CHECK_DEADLOCK FALSE

CONSTANTS
    Procs      = {0, 1, 2, 3}
    ring       <- ring_value_n4
    NumTrains  = 2
    Messages   = {m1, m2, m3}
    MaxClock   = 5
    MaxPending = 2
    Mode       = "UTO"

SYMMETRY MessageSymmetry

CONSTRAINT StateConstraint

INVARIANTS
    TypeOK
    ClockMonotonicity
    ConsistentDelivery
    NoSpuriousDelivery
    TrainIntegrity
    IssuerUniqueness

PROPERTIES
    EventualDelivery
