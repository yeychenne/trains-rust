\* TLC config: N=4 ring, NumTrains=2, MaxClock=4, 2 messages.
\* Bigger model than the default — exercises 4-process behaviour.
\* UTO mode (checks EventualDelivery); the Mode assignment was missing before
\* the v3 work, which left this config unrunnable ("Mode not assigned").

SPECIFICATION Spec

CHECK_DEADLOCK FALSE

CONSTANTS
    Procs      = {0, 1, 2, 3}
    ring       <- ring_value_n4
    NumTrains  = 2
    Messages   = {m1, m2}
    MaxClock   = 4
    MaxPending = 2
    Mode       = "UTO"

SYMMETRY MessageSymmetry

CONSTRAINT StateConstraint

INVARIANTS
    TypeOK
    ClockMonotonicity
    ConsistentDelivery
    NoSpuriousDelivery
    TrainIntegrity
    IssuerUniqueness

PROPERTIES
    EventualDelivery
