\* TLC model-checking configuration for TRAINS.tla
\*
\* Run with:
\*   java -cp tla2tools.jar tlc2.TLC TRAINS.tla -config TRAINS.cfg -workers auto
\*
\* Or via VSCode extension (Ctrl+Shift+P > TLA+: Check Model).

SPECIFICATION Spec

CONSTANTS
    Procs    = {0, 1, 2}
    ring     = <<0, 1, 2>>
    NumTrains = 2
    Messages  = {m1, m2, m3}
    MaxClock  = 4
    MaxPending = 2

SYMMETRY MessageSymmetry

CONSTRAINT StateConstraint

INVARIANTS
    TypeOK
    ClockMonotonicity
    ConsistentDelivery
    NoSpuriousDelivery
    TrainIntegrity
    IssuerUniqueness

PROPERTIES
    EventualDelivery
