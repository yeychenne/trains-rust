<svg viewBox="0 0 860 400" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, Segoe UI, Roboto, sans-serif" role="img" aria-label="Raft versus TRAINS critical path">
  <title>Raft vs TRAINS — where the work concentrates</title>
  <desc>Raft routes every committed message through one leader, a bottleneck with a one-round-trip critical path. TRAINS has no leader: every node forwards equal load, with two ring laps before delivery and K trains in flight.</desc>
  <rect x="0" y="0" width="860" height="400" rx="14" fill="#f8f9fb" stroke="#e2e6ee"/>
  <text x="28" y="40" font-size="21" font-weight="700" fill="#1a2a3a">Raft vs TRAINS — where the work concentrates</text>

  <defs>
    <marker id="rv" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#d64545"/></marker>
    <marker id="tv" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#1971c2"/></marker>
  </defs>

  <!-- LEFT: Raft -->
  <rect x="24" y="64" width="396" height="290" rx="11" fill="#fdf0ef" stroke="#d64545" stroke-width="1.5"/>
  <text x="44" y="92" font-size="16" font-weight="700" fill="#b02a2a">Raft — leader-based</text>

  <circle cx="222" cy="160" r="34" fill="#f7c4c4" stroke="#d64545" stroke-width="2.5"/>
  <text x="222" y="158" font-size="13" font-weight="700" fill="#8a2020" text-anchor="middle">Leader</text>
  <text x="222" y="174" font-size="10" fill="#8a2020" text-anchor="middle">bottleneck</text>
  <circle cx="110" cy="270" r="28" fill="#fff" stroke="#d99" stroke-width="2"/><text x="110" y="274" font-size="11" fill="#8a4040" text-anchor="middle">F1</text>
  <circle cx="222" cy="290" r="28" fill="#fff" stroke="#d99" stroke-width="2"/><text x="222" y="294" font-size="11" fill="#8a4040" text-anchor="middle">F2</text>
  <circle cx="334" cy="270" r="28" fill="#fff" stroke="#d99" stroke-width="2"/><text x="334" y="274" font-size="11" fill="#8a4040" text-anchor="middle">F3</text>
  <line x1="222" y1="194" x2="120" y2="244" stroke="#d64545" stroke-width="1.8" marker-end="url(#rv)"/>
  <line x1="222" y1="194" x2="222" y2="260" stroke="#d64545" stroke-width="1.8" marker-end="url(#rv)"/>
  <line x1="222" y1="194" x2="326" y2="244" stroke="#d64545" stroke-width="1.8" marker-end="url(#rv)"/>
  <text x="222" y="332" font-size="12.5" fill="#7a3030" text-anchor="middle">O(N) msgs concentrate on the leader</text>
  <text x="222" y="349" font-size="12.5" fill="#7a3030" text-anchor="middle">≈ 1 RTT commit · throughput ≤ B / (N−1)</text>

  <!-- RIGHT: TRAINS -->
  <rect x="440" y="64" width="396" height="290" rx="11" fill="#eef5ff" stroke="#1971c2" stroke-width="1.5"/>
  <text x="460" y="92" font-size="16" font-weight="700" fill="#1456a0">TRAINS — leaderless ring</text>

  <circle cx="638" cy="150" r="30" fill="#e7f1ff" stroke="#1971c2" stroke-width="2.5"/><text x="638" y="155" font-size="12" font-weight="700" fill="#1456a0" text-anchor="middle">N0</text>
  <circle cx="730" cy="250" r="30" fill="#e7f1ff" stroke="#1971c2" stroke-width="2.5"/><text x="730" y="255" font-size="12" font-weight="700" fill="#1456a0" text-anchor="middle">N1</text>
  <circle cx="546" cy="250" r="30" fill="#e7f1ff" stroke="#1971c2" stroke-width="2.5"/><text x="546" y="255" font-size="12" font-weight="700" fill="#1456a0" text-anchor="middle">N2</text>
  <line x1="662" y1="168" x2="712" y2="228" stroke="#1971c2" stroke-width="1.8" marker-end="url(#tv)"/>
  <line x1="700" y1="262" x2="578" y2="262" stroke="#1971c2" stroke-width="1.8" marker-end="url(#tv)"/>
  <line x1="566" y1="226" x2="616" y2="170" stroke="#1971c2" stroke-width="1.8" marker-end="url(#tv)"/>
  <text x="638" y="332" font-size="12.5" fill="#34536e" text-anchor="middle">every node forwards equal load, no leader</text>
  <text x="638" y="349" font-size="12.5" fill="#34536e" text-anchor="middle">2 ring laps · K trains · throughput ≈ K·B / 2N</text>

  <text x="28" y="386" font-size="13" fill="#34465a"><tspan font-weight="700" fill="#1a2a3a">Crossover:</tspan> TRAINS overtakes Raft on broadcast throughput when K &gt; 2N/(N−1) — three trains at N=5.</text>
</svg>
