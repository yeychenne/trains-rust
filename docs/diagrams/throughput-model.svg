<svg viewBox="0 0 840 380" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, Segoe UI, Roboto, sans-serif" role="img" aria-label="Throughput vs ring size model">
  <title>Throughput vs N — TRAINS scales with trains, Raft is leader-bound</title>
  <desc>Illustrative aggregate throughput against number of processes N. Raft declines as the leader saturates; TRAINS rises with more concurrent trains. They cross near N=5 for K=4.</desc>
  <rect x="0" y="0" width="840" height="380" rx="14" fill="#f8f9fb" stroke="#e2e6ee"/>
  <text x="28" y="38" font-size="20" font-weight="700" fill="#1a2a3a">Aggregate throughput vs ring size (illustrative)</text>

  <!-- axes -->
  <line x1="90" y1="90" x2="90" y2="300" stroke="#aab4c0" stroke-width="1.5"/>
  <line x1="90" y1="300" x2="800" y2="300" stroke="#aab4c0" stroke-width="1.5"/>
  <!-- gridlines -->
  <g stroke="#e7ebf1" stroke-width="1">
    <line x1="90" y1="247.5" x2="800" y2="247.5"/>
    <line x1="90" y1="195" x2="800" y2="195"/>
    <line x1="90" y1="142.5" x2="800" y2="142.5"/>
  </g>
  <g font-size="11" fill="#8794a2" text-anchor="end">
    <text x="82" y="304">0</text><text x="82" y="251">50</text><text x="82" y="199">100</text><text x="82" y="146">150</text><text x="82" y="94">200</text>
  </g>
  <text x="34" y="200" font-size="12" fill="#5b6b7d" transform="rotate(-90 34 200)" text-anchor="middle">throughput (normalised)</text>
  <g font-size="11" fill="#8794a2" text-anchor="middle">
    <text x="90" y="318">N=3</text><text x="228" y="318">5</text><text x="366" y="318">7</text><text x="504" y="318">9</text><text x="642" y="318">11</text><text x="780" y="318">13</text>
  </g>
  <text x="445" y="340" font-size="12" fill="#5b6b7d" text-anchor="middle">number of processes (N)</text>

  <!-- Raft (declining) -->
  <polyline points="90,195 228,216 366,231.75 504,242.25 642,249.6 780,255.9" fill="none" stroke="#d64545" stroke-width="2.6"/>
  <!-- TRAINS K=4 -->
  <polyline points="90,237 228,195 366,163.5 504,137.25 642,116.25 780,95.25" fill="none" stroke="#1971c2" stroke-width="2.6"/>
  <!-- TRAINS K=2 -->
  <polyline points="90,258 228,237 366,221.25 504,208.65 642,200.25 780,189.75" fill="none" stroke="#c98a00" stroke-width="2.6" stroke-dasharray="6 4"/>

  <!-- crossover marker -->
  <circle cx="200" cy="206" r="6" fill="none" stroke="#e8590c" stroke-width="2"/>
  <text x="206" y="190" font-size="11.5" font-weight="700" fill="#e8590c">crossover: K &gt; 2N/(N−1)</text>

  <!-- legend -->
  <g font-size="12.5">
    <rect x="600" y="96" width="196" height="78" rx="8" fill="#fff" stroke="#e2e6ee"/>
    <line x1="614" y1="116" x2="642" y2="116" stroke="#1971c2" stroke-width="2.6"/><text x="650" y="120" fill="#1456a0">TRAINS (K=4 trains)</text>
    <line x1="614" y1="138" x2="642" y2="138" stroke="#c98a00" stroke-width="2.6" stroke-dasharray="6 4"/><text x="650" y="142" fill="#9a6b00">TRAINS (K=2 trains)</text>
    <line x1="614" y1="160" x2="642" y2="160" stroke="#d64545" stroke-width="2.6"/><text x="650" y="164" fill="#b02a2a">Raft (leader-bound)</text>
  </g>

  <text x="90" y="368" font-size="12" fill="#8794a2" font-style="italic">Illustrative shape only — actual numbers depend on hardware, network, and payload (measured numbers in paper-benchmarks.md). The point: TRAINS scales with K; Raft is bottlenecked at the leader.</text>
</svg>
